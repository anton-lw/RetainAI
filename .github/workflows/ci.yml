name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  test-and-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: apps/api/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Install backend dependencies
        run: python -m pip install -r apps/api/requirements.txt

      - name: Install frontend dependencies
        run: npm --prefix apps/web ci

      - name: Install Playwright browser
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Validate Docker Compose file
        run: docker compose config -q

      - name: Validate Terraform formatting
        run: terraform -chdir=infra/terraform/aws fmt -check

      - name: Validate Terraform configuration
        run: |
          terraform -chdir=infra/terraform/aws init -backend=false
          terraform -chdir=infra/terraform/aws validate

      - name: Run backend tests
        run: python -m pytest -q

      - name: Build frontend
        run: npm --prefix apps/web run build

      - name: Run Playwright end-to-end tests
        run: npm --prefix apps/web run test:e2e
