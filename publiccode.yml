description:
  en:
    localisedName: RetainAI
    shortDescription: "Open-source retention operations software for development programs."
    longDescription: >
      RetainAI helps organizations ingest longitudinal monitoring data, score
      near-term disengagement risk, prioritize follow-up actions within real
      field capacity, log interventions, run validation and shadow-mode
      evaluation, and export program governance and donor reporting outputs.
    features:
      - "CSV/XLSX and connector-based ingestion"
      - "Capacity-aware risk queue and intervention workflows"
      - "Temporal backtesting, fairness review, and shadow mode"
      - "Self-hosted deployment with open-source infrastructure assets"
